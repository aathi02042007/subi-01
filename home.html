<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Story ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --rose:    #e8789a;
  --blush:   #f2afc5;
  --violet:  #9b59b6;
  --deep:    #2d0a3a;
  --midnight:#12001c;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.1);
  --nav-h: 68px;
}

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--midnight);
  font-family: 'Montserrat', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(232,120,154,0.4); border-radius: 10px; }

/* ════════════════════════════════
   NAV BAR
════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 9999;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem;
  background: rgba(18,0,28,0.55);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(232,120,154,0.18);
  box-shadow: 0 4px 40px rgba(0,0,0,0.4);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-style: italic;
  font-weight: 300;
  background: linear-gradient(135deg, var(--blush), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.05em;
}

.nav-links {
  display: flex; gap: 0.25rem;
  list-style: none;
}

.nav-links a {
  display: block;
  padding: 0.45rem 1rem;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  border-radius: 30px;
  transition: color 0.3s, background 0.3s;
}
.nav-links a:hover, .nav-links a.active {
  color: #fff;
  background: rgba(232,120,154,0.18);
}
.nav-links a.active { color: var(--blush); }

/* ── Music button ── */
#music-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(232,120,154,0.4);
  background: rgba(232,120,154,0.1);
  backdrop-filter: blur(10px);
  color: var(--blush);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: box-shadow 0.3s, background 0.3s;
  flex-shrink: 0;
}
#music-btn:hover { box-shadow: 0 0 20px rgba(232,120,154,0.5); background: rgba(232,120,154,0.2); }
#music-btn.playing { animation: musicPulse 1.5s ease-in-out infinite; }
@keyframes musicPulse { 0%,100%{box-shadow:0 0 12px rgba(232,120,154,0.4)} 50%{box-shadow:0 0 28px rgba(232,120,154,0.8)} }

/* ════════════════════════════════
   PAGE CONTENT
════════════════════════════════ */
.page { padding-top: calc(var(--nav-h) + 3rem); padding-bottom: 5rem; }

/* ── BG gradient blobs ── */
.blob {
  position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none;
}
.blob-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: radial-gradient(circle, rgba(232,120,154,0.12) 0%, transparent 70%); }
.blob-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(155,89,182,0.14) 0%, transparent 70%); }

/* ── Section wrapper ── */
section { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }

.section-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 0.75rem;
}

/* ── Section heading ── */
.section-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 300;
  font-style: italic;
  line-height: 1.2;
  background: linear-gradient(135deg, #fff 40%, var(--blush));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 2.5rem;
}

/* ═══════════
   SLIDESHOW
═══════════ */
.slideshow-wrapper {
  position: relative;
  width: 100%;
  max-width: 640px;
  margin: 0 auto 3.5rem;
  border-radius: 20px;
  overflow: hidden;
  /* Neon border via outline + box-shadow */
  box-shadow:
    0 0 0 2px rgba(232,120,154,0.6),
    0 0 30px rgba(232,120,154,0.4),
    0 0 70px rgba(155,89,182,0.25),
    0 20px 60px rgba(0,0,0,0.6);
}

.slideshow-track {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: #1a0028;
}

.slide {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease, transform 8s ease;
  transform: scale(1.06);
}
.slide.active {
  opacity: 1;
  transform: scale(1);
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* Gradient overlays on slides */
.slide::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(18,0,28,0.7) 0%, transparent 50%);
}

/* Slide caption */
.slide-caption {
  position: absolute; bottom: 1.5rem; left: 0; right: 0;
  text-align: center; z-index: 5;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.05em;
  padding: 0 2rem;
  transition: opacity 0.5s;
}

/* Slide dots */
.slide-dots {
  position: absolute; bottom: 0.75rem; right: 1.25rem;
  display: flex; gap: 6px; z-index: 10;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.4s, transform 0.4s;
}
.dot.active { background: var(--rose); transform: scale(1.4); }

/* Neon border animation */
.slideshow-wrapper::before {
  content: '';
  position: absolute; inset: -2px; z-index: 5;
  border-radius: 22px;
  background: conic-gradient(from 0deg, var(--rose), var(--violet), var(--blush), var(--rose));
  animation: borderSpin 6s linear infinite;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 2px;
}
@keyframes borderSpin { to { filter: hue-rotate(360deg); } }

/* ═══════════════
   TYPEWRITER BOX
═══════════════ */
.typewriter-wrapper {
  max-width: 640px;
  margin: 0 auto;
  padding: 2.5rem 2.5rem 2rem;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.07);
  text-align: center;
  min-height: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem;
}

.tw-icon {
  font-size: 1.8rem;
  animation: float 3s ease-in-out infinite;
}

.tw-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.1rem, 2.8vw, 1.55rem);
  font-style: italic;
  font-weight: 300;
  color: rgba(255,255,255,0.92);
  line-height: 1.7;
  min-height: 3.5em;
  display: flex; align-items: center; justify-content: center;
}

.tw-cursor {
  display: inline-block;
  width: 2px; height: 1.2em;
  background: var(--rose);
  margin-left: 3px;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.tw-dots {
  display: flex; gap: 8px;
}
.tw-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(232,120,154,0.3);
  transition: background 0.4s;
}
.tw-dot.active { background: var(--rose); }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* ── Responsive ── */
@media(max-width:600px){
  nav { padding: 0 1rem; }
  .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.65rem; }
  .typewriter-wrapper { padding: 1.8rem 1.5rem; }
}
</style>
</head>
<body>

<!-- Background blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- ══ NAV ══ -->
<nav>
  <div class="nav-logo">Her World ❤️</div>
  <ul class="nav-links">
    <li><a href="home.html" class="active">Our Story</a></li>
    <li><a href="favorites.html">Her Vibe</a></li>
    <li><a href="memories.html">Our Journey</a></li>
    <li><a href="letter.html">Love Letter</a></li>
  </ul>
  <button id="music-btn" title="Toggle music">♪</button>
</nav>

<!-- ══ CONTENT ══ -->
<div class="page">
  <section>
    <p class="section-label">Our Story</p>
    <h1 class="section-heading">Every chapter<br/>begins with her.</h1>

    <!-- Slideshow -->
    <div class="slideshow-wrapper">
      <div class="slideshow-track" id="slideshowTrack">
        <!-- Slides injected by JS -->
      </div>
      <div class="slide-dots" id="slideDots"></div>
    </div>

    <!-- Typewriter -->
    <div class="typewriter-wrapper">
      <div class="tw-icon">💌</div>
      <div class="tw-text" id="twText"><span class="tw-cursor"></span></div>
      <div class="tw-dots" id="twDots"></div>
    </div>
  </section>
</div>

<audio id="bgMusic" loop>
  <!-- Replace src with your audio file URL -->
  <source src="assets/music/perfect.mp3" type="audio/mpeg" />
</audio>

<script>
// ══════════════════════════════════════════
//  CONFIG — edit freely
// ══════════════════════════════════════════
const CONFIG = {
  // Replace URLs with direct image links (or relative paths to photos)
  slides: [
    { url: 'images/fun.jpeg', caption: 'fun time epothumey irukum' },
    { url: 'images/love.jpeg', caption: 'onoda love sollama soluva athu pidikum...' },
    { url: 'images/3.jpeg', caption: 'Every glance tells a story.' },
    { url: 'images/4.jpeg', caption: 'You are nothing short of poetry.' },
    { url: 'images/5.jpeg', caption: 'Stars dim when you walk in.' },
  ],

  // Typewriter messages
  messages: [
    "Subanya, unna first time paatha naal la irunthu nee than en favorite person ❤️",
    "Un smile paatha udane en day complete aagidum 🌸",
    "daily kalaila vara msg la nee irukiya nu paapen 💌"
  ],

  // Slide interval in ms
  slideInterval: 4500,
  // Typewriter speed in ms per character
  typeSpeed: 60,
  // Pause between messages in ms
  messagePause: 2800,

  // Music file URL (mp3 / ogg)
  musicSrc: 'assets/music/perfect.mp3',
};
// ══════════════════════════════════════════

/* ── Build Slides ── */
const track = document.getElementById('slideshowTrack');
const dotsEl = document.getElementById('slideDots');

CONFIG.slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.innerHTML = `<img src="${s.url}" alt="Photo ${i+1}" loading="lazy" /><div class="slide-caption">${s.caption}</div>`;
  track.appendChild(div);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(dot);
});

let current = 0;
const slides = track.querySelectorAll('.slide');
const dots   = dotsEl.querySelectorAll('.dot');

function goTo(n) {
  slides[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = (n + slides.length) % slides.length;
  slides[current].classList.add('active');
  dots[current].classList.add('active');
}
setInterval(() => goTo(current + 1), CONFIG.slideInterval);

/* ── Typewriter ── */
const twText = document.getElementById('twText');
const twDotsEl = document.getElementById('twDots');
let msgIdx = 0;

// Build dots
CONFIG.messages.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'tw-dot' + (i === 0 ? ' active' : '');
  twDotsEl.appendChild(d);
});
const twDotNodes = twDotsEl.querySelectorAll('.tw-dot');

function setActiveDot(i) {
  twDotNodes.forEach((d, idx) => d.classList.toggle('active', idx === i));
}

async function type(text) {
  twText.innerHTML = '<span class="tw-cursor"></span>';
  for (let i = 0; i < text.length; i++) {
    await delay(CONFIG.typeSpeed);
    twText.innerHTML = text.slice(0, i + 1) + '<span class="tw-cursor"></span>';
  }
}

async function erase(text) {
  for (let i = text.length; i >= 0; i--) {
    await delay(CONFIG.typeSpeed * 0.5);
    twText.innerHTML = text.slice(0, i) + '<span class="tw-cursor"></span>';
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loopMessages() {
  while (true) {
    const msg = CONFIG.messages[msgIdx];
    setActiveDot(msgIdx);
    await type(msg);
    await delay(CONFIG.messagePause);
    await erase(msg);
    await delay(400);
    msgIdx = (msgIdx + 1) % CONFIG.messages.length;
  }
}
loopMessages();

/* ── Music ── */
const music = document.getElementById('bgMusic');
const btn = document.getElementById('music-btn');

music.volume = 0.5;

// Page load aana autoplay try pannum
window.addEventListener('load', () => {
    music.play()
    .then(() => {
        btn.classList.add('playing');
        btn.textContent = '♬';
    })
    .catch(() => {
        console.log("Autoplay blocked");
    });
});

// User first click panna music start aagum
document.addEventListener('click', () => {
    if (music.paused) {
        music.play();
        btn.classList.add('playing');
        btn.textContent = '♬';
    }
}, { once: true });

// Music button
btn.addEventListener('click', (e) => {
    e.stopPropagation();

    if (music.paused) {
        music.play();
        btn.classList.add('playing');
        btn.textContent = '♬';
    } else {
        music.pause();
        btn.classList.remove('playing');
        btn.textContent = '♪';
    }
});
</script>
</body>
</html>
