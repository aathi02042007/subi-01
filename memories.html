<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Journey ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --rose:    #e8789a;
  --blush:   #f2afc5;
  --violet:  #9b59b6;
  --deep:    #2d0a3a;
  --midnight:#12001c;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.1);
  --nav-h: 68px;
}

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--midnight);
  font-family: 'Montserrat', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(232,120,154,0.4); border-radius: 10px; }

/* ═══ NAV ═══ */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 9999;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem;
  background: rgba(18,0,28,0.55);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(232,120,154,0.18);
  box-shadow: 0 4px 40px rgba(0,0,0,0.4);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem; font-style: italic; font-weight: 300;
  background: linear-gradient(135deg, var(--blush), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.nav-links { display: flex; gap: 0.25rem; list-style: none; }
.nav-links a {
  display: block; padding: 0.45rem 1rem;
  font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.6); text-decoration: none; border-radius: 30px;
  transition: color 0.3s, background 0.3s;
}
.nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(232,120,154,0.18); }
.nav-links a.active { color: var(--blush); }
#music-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(232,120,154,0.4); background: rgba(232,120,154,0.1);
  backdrop-filter: blur(10px); color: var(--blush); font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: box-shadow 0.3s, background 0.3s; flex-shrink: 0;
}
#music-btn:hover { box-shadow: 0 0 20px rgba(232,120,154,0.5); }
#music-btn.playing { animation: musicPulse 1.5s ease-in-out infinite; }
@keyframes musicPulse { 0%,100%{box-shadow:0 0 12px rgba(232,120,154,0.4)} 50%{box-shadow:0 0 28px rgba(232,120,154,0.8)} }

/* ═══ BACKGROUND ═══ */
.blob { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none; }
.blob-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: radial-gradient(circle, rgba(232,120,154,0.12) 0%, transparent 70%); }
.blob-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(155,89,182,0.14) 0%, transparent 70%); }

/* ═══ CONTENT ═══ */
.page { padding-top: calc(var(--nav-h) + 3rem); padding-bottom: 6rem; position: relative; z-index: 1; }
.container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }

.section-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.75rem; }
.section-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 300; font-style: italic; line-height: 1.2;
  background: linear-gradient(135deg, #fff 40%, var(--blush));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 3.5rem;
}

/* ══════════════════
   TIMELINE
══════════════════ */
.timeline {
  position: relative;
  padding-left: 2.5rem;
}

/* Vertical line */
.timeline::before {
  content: '';
  position: absolute;
  left: 0; top: 16px; bottom: 16px;
  width: 2px;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(232,120,154,0.6) 10%,
    rgba(155,89,182,0.6) 50%,
    rgba(232,120,154,0.6) 90%,
    transparent 100%
  );
}

/* ── Timeline entry ── */
.entry {
  position: relative;
  margin-bottom: 3rem;
  opacity: 0;
  transform: translateX(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.entry.visible { opacity: 1; transform: translateX(0); }

/* Node dot on the line */
.entry::before {
  content: '';
  position: absolute;
  left: -2.5rem;
  top: 18px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 0 4px rgba(232,120,154,0.2), 0 0 16px rgba(232,120,154,0.5);
  transform: translateX(-6px);
  z-index: 2;
}

/* Connector tick from dot to card */
.entry::after {
  content: '';
  position: absolute;
  left: calc(-2.5rem + 8px); top: 24px;
  width: 1.8rem; height: 1px;
  background: rgba(232,120,154,0.35);
}

/* Card */
.entry-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 1.75rem 2rem;
  box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
}
.entry-card:hover { transform: translateY(-4px); box-shadow: 0 16px 50px rgba(0,0,0,0.4), 0 0 20px rgba(232,120,154,0.12); }

/* Card top row */
.entry-top {
  display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem;
}
.entry-emoji {
  font-size: 2rem; line-height: 1;
  filter: drop-shadow(0 0 8px rgba(232,120,154,0.5));
}
.entry-meta { flex: 1; }
.entry-date {
  font-size: 0.68rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--rose); margin-bottom: 4px;
}
.entry-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 400; font-style: italic;
  color: #fff; line-height: 1.3;
}

.entry-body {
  font-size: 0.88rem; line-height: 1.75;
  color: rgba(255,255,255,0.65);
}

/* Photo strip inside cards (optional) */
.entry-photo {
  margin-top: 1.25rem;
  width: 100%; border-radius: 12px;
  object-fit: cover; height: 200px;
  border: 1px solid rgba(255,255,255,0.08);
  display: block;
}

/* ── Stats row ── */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1rem; margin-top: 4rem;
}
.stat-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 1.5rem;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.3s;
}
.stat-card:hover { transform: translateY(-4px); }
.stat-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem; font-style: italic; font-weight: 300;
  background: linear-gradient(135deg, var(--blush), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: block; margin-bottom: 4px;
}
.stat-label { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

@media(max-width:600px) {
  nav { padding: 0 1rem; }
  .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.65rem; }
  .timeline { padding-left: 1.8rem; }
  .entry::after { width: 1.2rem; }
  .stats-row { grid-template-columns: 1fr; }
  .entry-card { padding: 1.25rem 1.25rem; }
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- ══ NAV ══ -->
<nav>
  <div class="nav-logo">Her World ❤️</div>
  <ul class="nav-links">
    <li><a href="home.html">Our Story</a></li>
    <li><a href="favorites.html">Her Vibe</a></li>
    <li><a href="memories.html" class="active">Our Journey</a></li>
    <li><a href="letter.html">Love Letter</a></li>
  </ul>
  <button id="music-btn" title="Toggle music">♪</button>
</nav>

<div class="page">
  <div class="container">

    <p class="section-label">Our Journey</p>
    <h1 class="section-heading">A timeline written<br/>in quiet moments.</h1>

    <div class="timeline" id="timeline">
      <!-- Entries injected by JS -->
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

  </div>
</div>

<audio id="bgMusic" loop>
  <source src="assets/music/perfect.mp3" type="audio/mpeg" />
</audio>

<script>
// ══════════════════════════════════════════
//  CONFIG — edit freely
// ══════════════════════════════════════════
const CONFIG = {
  timeline: [
    {
      emoji: '✨',
      date:  'The Very Beginning',
      title: 'The First Time I Noticed You',
      body:  'I did not know then that a single glance would stay with me this long. There was something in your presence that made the whole room quieter — in the best possible way. I have been replaying it ever since.',
      photo: '', // Optional: image URL to show inside the card
    },
    {
      emoji: '🌸',
      date:  'A Bright Morning',
      title: 'The First Conversation',
      body:  'We talked for what felt like minutes but was somehow hours. You made everything feel easy. Your laugh — I decided right then that I wanted to hear it as often as possible.',
      photo: '',
    },
    {
      emoji: '🎶',
      date:  'An Unexpected Afternoon',
      title: 'When You Showed Me Your Playlist',
      body:  'Every song felt like a window into a part of you I had not yet seen. I went home and listened to all of it. Twice. I understood something about you that day I could not put into words.',
      photo: '',
    },
    {
      emoji: '🌙',
      date:  'A Late Night',
      title: 'The Time We Stayed Up Too Late',
      body:  'The world was asleep but neither of us could stop talking. Some conversations feel like they are building something — a bridge, a story, a beginning. That one was all three.',
      photo: '',
    },
    {
      emoji: '💫',
      date:  'Right Now',
      title: 'Every Day I Think of You',
      body:  'Ordinary things remind me of you. A song on the radio. A certain kind of light in the afternoon. I am not sure when it happened, but at some point you became a part of the way I see the world.',
      photo: '',
    },
  ],

  stats: [
    { number: '∞',   label: 'Thoughts of You' },
    { number: '1',   label: 'Person Like Her' },
    { number: '💗',  label: 'Feeling I Can\'t Explain' },
  ],

  musicSrc: '',
};
// ══════════════════════════════════════════

/* Build timeline */
const timelineEl = document.getElementById('timeline');
CONFIG.timeline.forEach((entry, i) => {
  const el = document.createElement('div');
  el.className = 'entry';
  el.style.transitionDelay = `${i * 0.12}s`;
  el.innerHTML = `
    <div class="entry-card">
      <div class="entry-top">
        <div class="entry-emoji">${entry.emoji}</div>
        <div class="entry-meta">
          <div class="entry-date">${entry.date}</div>
          <div class="entry-title">${entry.title}</div>
        </div>
      </div>
      <p class="entry-body">${entry.body}</p>
      ${entry.photo ? `<img class="entry-photo" src="${entry.photo}" alt="${entry.title}" loading="lazy" />` : ''}
    </div>
  `;
  timelineEl.appendChild(el);
});

/* Build stats */
const statsRow = document.getElementById('statsRow');
CONFIG.stats.forEach(s => {
  const card = document.createElement('div');
  card.className = 'stat-card';
  card.innerHTML = `<span class="stat-number">${s.number}</span><span class="stat-label">${s.label}</span>`;
  statsRow.appendChild(card);
});

/* Intersection observer — scroll reveal */
const entries = document.querySelectorAll('.entry');
const observer = new IntersectionObserver((obs) => {
  obs.forEach(ob => { if (ob.isIntersecting) { ob.target.classList.add('visible'); observer.unobserve(ob.target); } });
}, { threshold: 0.12 });
entries.forEach(e => observer.observe(e));

/* Music */
const music = document.getElementById('bgMusic');
const btn = document.getElementById('music-btn');

music.volume = 0.5;

window.addEventListener('load', () => {
    music.play()
    .then(() => {
        btn.classList.add('playing');
        btn.textContent = '♬';
    })
    .catch(() => {
        console.log("Autoplay blocked");
    });
});

document.addEventListener('click', () => {
    if (music.paused) {
        music.play();
        btn.classList.add('playing');
        btn.textContent = '♬';
    }
}, { once: true });

btn.addEventListener('click', (e) => {
    e.stopPropagation();

    if (music.paused) {
        music.play();
        btn.classList.add('playing');
        btn.textContent = '♬';
    } else {
        music.pause();
        btn.classList.remove('playing');
        btn.textContent = '♪';
    }
});
</script>
</body>
</html>
